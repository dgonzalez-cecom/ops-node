services:
  ops-node-api-php:
    build:
      context: ./ops-node-api
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    environment:
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ops_node}
      DB_USERNAME: ${DB_USERNAME:-ops_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    networks:
      - ops-network

  ops-node-api-nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - ops-node-api-php
    networks:
      - ops-network

  ops-node-front:
    build:
      context: ./ops-node-front
    restart: unless-stopped
    depends_on:
      - ops-node-api-nginx
    networks:
      - ops-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ops-network

  ops-node-horizon-worker:
    build:
      context: ./ops-node-api
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    environment:
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ops_node}
      DB_USERNAME: ${DB_USERNAME:-ops_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    command: php artisan horizon
    networks:
      - ops-network

  ops-node-scheduler:
    build:
      context: ./ops-node-api
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    environment:
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ops_node}
      DB_USERNAME: ${DB_USERNAME:-ops_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    networks:
      - ops-network

volumes:
  redis_data:
  front_node_modules:

networks:
  ops-network:
    driver: bridge
