services:
  ops-node-api-php:
    build:
      context: ./ops-node-api
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://intranet-lab.goc.mx}
      ASSET_URL: ${ASSET_URL:-https://intranet-lab.goc.mx}
      TRUSTED_PROXIES: "*"
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ops_node}
      DB_USERNAME: ${DB_USERNAME:-ops_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    volumes:
      - api_storage:/var/www/storage
      - api_cache:/var/www/bootstrap/cache
    networks:
      - ops-network

  ops-node-api-nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - ops-node-api-php
    volumes:
      - ./ops-node-api:/var/www:ro
      - ./ops-node-api/docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8081:80"
    networks:
      - ops-network

  ops-node-front:
    build:
      dockerfile: docker/node/Dockerfile-PROD
      context: ./ops-node-front
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    restart: unless-stopped
    depends_on:
      - ops-node-api-nginx
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - ops-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ops-network

  ops-node-horizon-worker:
    build:
      context: ./ops-node-api
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://intranet-lab.goc.mx}
      TRUSTED_PROXIES: "*"
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ops_node}
      DB_USERNAME: ${DB_USERNAME:-ops_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    command: php artisan horizon
    volumes:
      - api_storage:/var/www/storage
      - api_cache:/var/www/bootstrap/cache
    networks:
      - ops-network

  ops-node-scheduler:
    build:
      context: ./ops-node-api
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://intranet-lab.goc.mx}
      TRUSTED_PROXIES: "*"
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ops_node}
      DB_USERNAME: ${DB_USERNAME:-ops_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - api_storage:/var/www/storage
      - api_cache:/var/www/bootstrap/cache
    networks:
      - ops-network

volumes:
  redis_data:
  api_storage:
  api_cache:

networks:
  ops-network:
    driver: bridge
