services:
  ops-node-api-php:
    build:
      context: ./ops-node-api
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      APP_URL: ${APP_URL:-https://intranet-lab.goc.mx}
      ASSET_URL: ${ASSET_URL:-https://intranet-lab.goc.mx}
      TRUSTED_PROXIES: "*"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ops_node}
      DB_USERNAME: ${DB_USERNAME:-ops_node}
      DB_PASSWORD: ${DB_PASSWORD:-ops_node_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    networks:
      - ops-network

  ops-node-api-nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - ops-node-api-php
    volumes:
      - ./ops-node-api:/var/www:ro
      - ./ops-node-api/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      # Apache del servidor anfitrion consumira el API por localhost.
      # No se expone publicamente el contenedor.
      - "127.0.0.1:8081:80"
    networks:
      - ops-network

  ops-node-front:
    build:
      context: ./ops-node-front
      args:
        # Recomendado: consumir el API por la misma URL publica via Apache.
        # Ajusta el nombre de la variable si tu frontend usa otro prefijo.
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      - ops-node-api-nginx
    ports:
      # Apache del servidor anfitrion consumira el frontend por localhost.
      # Cambia 80 si tu imagen de front escucha en otro puerto interno.
      - "127.0.0.1:8080:80"
    networks:
      - ops-network

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ops_node}
      MYSQL_USER: ${DB_USERNAME:-ops_node}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ops_node_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: America/Mexico_City
    command: --default-time-zone='-06:00'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ops-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ops-network

  ops-node-horizon-worker:
    build:
      context: ./ops-node-api
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    depends_on:
      - mysql
      - redis
    environment:
      APP_URL: ${APP_URL:-https://intranet-lab.goc.mx}
      TRUSTED_PROXIES: "*"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ops_node}
      DB_USERNAME: ${DB_USERNAME:-ops_node}
      DB_PASSWORD: ${DB_PASSWORD:-ops_node_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    command: php artisan horizon
    networks:
      - ops-network

  ops-node-scheduler:
    build:
      context: ./ops-node-api
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    depends_on:
      - mysql
      - redis
    environment:
      APP_URL: ${APP_URL:-https://intranet-lab.goc.mx}
      TRUSTED_PROXIES: "*"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ops_node}
      DB_USERNAME: ${DB_USERNAME:-ops_node}
      DB_PASSWORD: ${DB_PASSWORD:-ops_node_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    networks:
      - ops-network

volumes:
  mysql_data:
  redis_data:
  front_node_modules:

networks:
  ops-network:
    driver: bridge
