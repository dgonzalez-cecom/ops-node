<VirtualHost *:80>
    ServerName intranet-lab.goc.mx
    Redirect permanent / https://intranet-lab.goc.mx/
</VirtualHost>

<VirtualHost *:443>
    ServerName intranet-lab.goc.mx

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/intranet-lab.goc.mx/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/intranet-lab.goc.mx/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # API Laravel dentro de Docker por Nginx interno
    ProxyPass /api http://127.0.0.1:8081/api retry=0
    ProxyPassReverse /api http://127.0.0.1:8081/api

    # Frontend dentro de Docker
    ProxyPass / http://127.0.0.1:8080/ retry=0
    ProxyPassReverse / http://127.0.0.1:8080/

    ErrorLog ${APACHE_LOG_DIR}/ops-node-error.log
    CustomLog ${APACHE_LOG_DIR}/ops-node-access.log combined
</VirtualHost>
