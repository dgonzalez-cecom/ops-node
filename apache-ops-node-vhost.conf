<VirtualHost *:80>
    ServerName intranet-lab.goc.mx
    # Redirige todo el tráfico HTTP hacia HTTPS
    Redirect permanent / https://intranet-lab.goc.mx/

    ServerAdmin webmaster@goc.mx
        ServerName intranet-lab.goc.mx
        #Header always set Content-Security-Policy "script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src * 'self'; base-uri 'self'; object-src 'self'"
        Header always set Referrer-Policy "no-referrer-when-downgrade"
        Redirect permanent / https://intranet-lab.goc.mx/
        CustomLog /var/log/apache2/intranet.goc.mx-access.log combined
        ErrorLog /var/log/apache2/intranet.goc.mx-error.log
        ServerSignature Off
</VirtualHost>

<VirtualHost *:443>
    ServerName intranet-lab.goc.mx

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/goc.mx.pem
    SSLCertificateKeyFile /etc/ssl/private/goc.mx.key

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 300

    # Encabezados para Laravel detrás de Reverse Proxy
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"

    # API Laravel dentro de Docker por Nginx interno
    ProxyPass /api http://127.0.0.1:8081/api retry=0
    ProxyPassReverse /api http://127.0.0.1:8081/api

    # Frontend dentro de Docker
    ProxyPass / http://127.0.0.1:8080/ retry=0
    ProxyPassReverse / http://127.0.0.1:8080/

    ErrorLog ${APACHE_LOG_DIR}/ops-node-error.log
    CustomLog ${APACHE_LOG_DIR}/ops-node-access.log combined
</VirtualHost>
